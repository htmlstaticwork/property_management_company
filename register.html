<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — LandLord Portal</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

    <div class="auth-card" style="max-width: 520px;">
        <!-- Logo -->
        <div class="auth-logo">
            <a href="index.html" class="logo">
                <div class="logo-monogram">LL</div>
                <span>LandLord</span>
            </a>
        </div>

        <!-- Toggles -->
        <div class="auth-toggles">
            <button id="theme-toggle" class="theme-toggle"></button>
            <button id="rtl-toggle" class="rtl-toggle">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
        </div>

        <!-- Form content -->
        <div class="form-header">
            <h2 id="register-title">Create Your Account</h2>
            <p>Join the future of residential management today.</p>
        </div>

        <form class="auth-form" id="register-form">
            <div class="input-container">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" required class="input-with-icon" style="width: 100%; padding: 14px 20px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-base); color: var(--text-primary); margin-bottom: 20px;">
            </div>
            <div class="input-container">
                <label>Email Address</label>
                <div class="input-with-icon">
                    <input type="email" placeholder="john.doe@example.com" required>
                </div>
            </div>
            
            <div id="dynamic-field-container">
                <div class="input-container">
                    <label id="dynamic-label">Number of Properties</label>
                    <div class="input-with-icon">
                        <input type="number" id="dynamic-input" placeholder="e.g. 5" min="1">
                    </div>
                </div>
            </div>

            <div class="input-container">
                <label>Password</label>
                <div class="input-with-icon">
                    <input type="password" id="pw-field" placeholder="••••••••" required>
                    <span class="input-icon" id="toggle-pw">👁️</span>
                </div>
            </div>

            <label style="display: flex; align-items: flex-start; gap: 8px; cursor: pointer; font-size: 13px;">
                <input type="checkbox" required style="margin-top: 4px;"> 
                <span>I accept the <a href="#" class="auth-link">Terms & Conditions</a> and <a href="#" class="auth-link">Privacy Policy</a></span>
            </label>

            <button type="submit" class="btn auth-btn" id="reg-btn">Create Account</button>
        </form>

        <div class="social-login">
            <div class="social-divider">or signup with</div>
            <div class="social-btns" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <button class="social-btn google-btn">
                   <span style="font-weight: bold; font-size: 18px;">G</span> Google
                </button>
                <button class="social-btn apple-btn" style="background: #000; color: white; border: none; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 8px; cursor: pointer;">
                   <span style="font-weight: bold; font-size: 18px;"></span> Apple
                </button>
            </div>
        </div>

        <div class="auth-footer">
            Already have an account? <a href="login.html" class="auth-link">Log In</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script>
        document.getElementById('toggle-pw').addEventListener('click', () => {
            const field = document.getElementById('pw-field');
            field.type = field.type === 'password' ? 'text' : 'password';
        });

        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Registration Successful! Your account has been created.');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
