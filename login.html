<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — LandLord Portal</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-page">

    <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
            <a href="index.html" class="logo">
                <div class="logo-monogram">LL</div>
                <span>LandLord</span>
            </a>
        </div>

        <!-- Toggles (Theme/RTL) -->
        <div class="auth-toggles">
            <button id="theme-toggle" class="theme-toggle"></button>
            <button id="rtl-toggle" class="rtl-toggle">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
            </button>
        </div>

        <!-- User Type -->
        <!-- Form content -->
        <div class="form-header">
            <h2 id="login-title">Welcome Back</h2>
            <p>Please enter your details to access your account.</p>
        </div>

        <form class="auth-form" id="login-form">
            <div class="input-container">
                <label>Email Address</label>
                <div class="input-with-icon">
                    <input type="email" placeholder="email@example.com" required>
                </div>
            </div>
            <div class="input-container">
                <label>Password</label>
                <div class="input-with-icon">
                    <input type="password" id="password-field" placeholder="••••••••" required>
                    <span class="input-icon" id="toggle-password">👁️</span>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 13px;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox"> Remember Me
                </label>
                <a href="#" class="auth-link">Forgot Password?</a>
            </div>
            <button type="submit" class="btn auth-btn" id="login-btn">Login to Account</button>
        </form>

        <div class="social-login">
            <div class="social-divider">or continue with</div>
            <div class="social-btns">
                <button class="social-btn google-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                    <span>Google</span>
                </button>
                <button class="social-btn apple-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple">
                    <span>Apple</span>
                </button>
            </div>
        </div>

        <div class="auth-footer">
            Don't have an account? <a href="register.html" class="auth-link">Create Account</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script>
        document.getElementById('toggle-password').addEventListener('click', () => {
            const field = document.getElementById('password-field');
            field.type = field.type === 'password' ? 'text' : 'password';
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Login Successful! You are now logged in. Use the dashboard links in the navbar to access your portal.');
            window.location.href = 'index.html';
        });
    </script>
</body>

</html>
