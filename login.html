<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — LandLord Portal</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
            <a href="index.html" class="logo">
                <div class="logo-monogram">LL</div>
                <span>LandLord</span>
            </a>
        </div>

        <!-- Toggles (Theme/RTL) -->
        <div class="auth-toggles">
            <button id="theme-toggle" class="theme-toggle"></button>
            <button id="rtl-toggle" class="rtl-toggle">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
        </div>

        <!-- User Type -->
        <div class="user-type-selector">
            <button class="type-btn active" data-type="owner">Owner</button>
            <button class="type-btn" data-type="tenant">Tenant</button>
        </div>

        <!-- Form content -->
        <div class="form-header">
            <h2 id="login-title">Owner Login</h2>
            <p>Welcome back! Please enter your details.</p>
        </div>

        <form class="auth-form" id="login-form">
            <div class="input-container">
                <label>Email Address</label>
                <div class="input-with-icon">
                    <input type="email" placeholder="email@example.com" required>
                </div>
            </div>
            <div class="input-container">
                <label>Password</label>
                <div class="input-with-icon">
                    <input type="password" id="password-field" placeholder="••••••••" required>
                    <span class="input-icon" id="toggle-password">👁️</span>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 13px;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox"> Remember Me
                </label>
                <a href="#" class="auth-link">Forgot Password?</a>
            </div>
            <button type="submit" class="btn auth-btn" id="login-btn">Owner Login</button>
        </form>

        <!-- Social Login -->
        <div class="social-login">
            <div class="social-divider">or continue with</div>
            <div class="social-btns">
                <button class="social-btn google-btn">
                   <span style="font-weight: bold; font-size: 18px;">G</span> Continue with Google
                </button>
                <button class="social-btn apple-btn">
                   <span style="font-weight: bold; font-size: 18px;"></span> Continue with Apple
                </button>
                <button class="social-btn" style="color: var(--text-muted);">
                   <span style="font-weight: bold; font-size: 18px;">✉</span> Continue with Email
                </button>
            </div>
        </div>

        <div class="auth-footer">
            Don't have an account? <a href="register.html" class="auth-link">Create Account</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script>
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const type = btn.getAttribute('data-type');
                document.getElementById('login-title').innerText = type === 'owner' ? 'Owner Login' : 'Tenant Login';
                document.getElementById('login-btn').innerText = type === 'owner' ? 'Owner Login' : 'Tenant Login';
            });
        });

        document.getElementById('toggle-password').addEventListener('click', () => {
            const field = document.getElementById('password-field');
            field.type = field.type === 'password' ? 'text' : 'password';
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Login Successful! You are now logged in. Use the dashboard links in the navbar to access your portal.');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
