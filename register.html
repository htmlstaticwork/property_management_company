<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — LandLord Portal</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

    <div class="auth-card" style="max-width: 520px;">
        <!-- Logo -->
        <div class="auth-logo">
            <a href="index.html" class="logo">
                <div class="logo-monogram">LL</div>
                <span>LandLord</span>
            </a>
        </div>

        <!-- Toggles -->
        <div class="auth-toggles">
            <button id="theme-toggle" class="theme-toggle"></button>
            <button id="rtl-toggle" class="rtl-toggle">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
        </div>

        <!-- User Type -->
        <div class="user-type-selector">
            <button class="type-btn active" data-type="owner">Owner</button>
            <button class="type-btn" data-type="tenant">Tenant</button>
        </div>

        <!-- Form content -->
        <div class="form-header">
            <h2 id="register-title">Owner Registration</h2>
            <p>Join the future of residential management today.</p>
        </div>

        <form class="auth-form" id="register-form">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="input-container">
                    <label>First Name</label>
                    <input type="text" placeholder="John" required class="input-with-icon" style="padding: 14px 20px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-base); color: var(--text-primary);">
                </div>
                <div class="input-container">
                    <label>Last Name</label>
                    <input type="text" placeholder="Doe" required class="input-with-icon" style="padding: 14px 20px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-base); color: var(--text-primary);">
                </div>
            </div>
            <div class="input-container">
                <label>Email Address</label>
                <div class="input-with-icon">
                    <input type="email" placeholder="john.doe@example.com" required>
                </div>
            </div>
            
            <div id="dynamic-field-container">
                <div class="input-container">
                    <label id="dynamic-label">Number of Properties</label>
                    <div class="input-with-icon">
                        <input type="number" id="dynamic-input" placeholder="e.g. 5" min="1">
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="input-container">
                    <label>Password</label>
                    <div class="input-with-icon">
                        <input type="password" id="pw-field" placeholder="••••••••" required>
                        <span class="input-icon" id="toggle-pw">👁️</span>
                    </div>
                </div>
                <div class="input-container">
                    <label>Confirm Password</label>
                    <div class="input-with-icon">
                        <input type="password" id="confirm-pw-field" placeholder="••••••••" required>
                        <span class="input-icon" id="toggle-confirm-pw">👁️</span>
                    </div>
                </div>
            </div>

            <label style="display: flex; align-items: flex-start; gap: 8px; cursor: pointer; font-size: 13px;">
                <input type="checkbox" required style="margin-top: 4px;"> 
                <span>I accept the <a href="#" class="auth-link">Terms & Conditions</a> and <a href="#" class="auth-link">Privacy Policy</a></span>
            </label>

            <button type="submit" class="btn auth-btn" id="reg-btn">Create Owner Account</button>
        </form>

        <div class="social-login">
            <div class="social-divider">or signup with</div>
            <div class="social-btns">
                <button class="social-btn google-btn">
                   <span style="font-weight: bold; font-size: 18px;">G</span> Google
                </button>
            </div>
        </div>

        <div class="auth-footer">
            Already have an account? <a href="login.html" class="auth-link">Log In</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script>
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const type = btn.getAttribute('data-type');
                document.getElementById('register-title').innerText = type === 'owner' ? 'Owner Registration' : 'Tenant Registration';
                document.getElementById('reg-btn').innerText = type === 'owner' ? 'Create Owner Account' : 'Create Tenant Account';
                
                const label = document.getElementById('dynamic-label');
                const input = document.getElementById('dynamic-input');
                if (type === 'owner') {
                    label.innerText = 'Number of Properties';
                    input.type = 'number';
                    input.placeholder = 'e.g. 5';
                } else {
                    label.innerText = 'Desired Move-in Date';
                    input.type = 'date';
                    input.placeholder = '';
                }
            });
        });

        document.getElementById('toggle-pw').addEventListener('click', () => {
            const field = document.getElementById('pw-field');
            field.type = field.type === 'password' ? 'text' : 'password';
        });
        document.getElementById('toggle-confirm-pw').addEventListener('click', () => {
            const field = document.getElementById('confirm-pw-field');
            field.type = field.type === 'password' ? 'text' : 'password';
        });

        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Registration Successful! Your account has been created. Use the dashboard links in the navbar to access your portal.');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
